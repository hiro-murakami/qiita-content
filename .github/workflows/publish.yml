# Please set 'QIITA_TOKEN' secret to your repository
name: Publish articles

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish_articles:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace local image paths
        run: |
          # 記事フォルダ内の .md ファイルを全て処理
          # フォルダ構成: public/*.md に対して画像が ../images/記事フォルダ/ 
          
          for md_file in public/*.md; do
            [ -e "$md_file" ] || continue
            
            # ファイル名から記事ID（フォルダ名）を取得
            article_id=$(basename "$md_file" .md)
            
            echo "Processing $md_file (Article ID: $article_id)"
            
            # 置換対象のパス文字列を構築
            # 記事内の表記が ../images/moguchart-core-introduction/foo.png の場合を想定
            old_path="../images/$article_id/"
            new_path="https://raw.githubusercontent.com/もぐさんのGitHubID/リポジトリ名/main/images/$article_id/"
            
            # 置換を実行（sedのデリミタを変更）
            sed -i "s|($old_path|($new_path|g" "$md_file"
            
            # 確認用：置換後の記事内の該当行を表示
            grep -E "https://raw" "$md_file" || echo "No match found for $article_id"
          done

      - uses: increments/qiita-cli/actions/publish@v1
        with:
          qiita-token: ${{ secrets.QIITA_TOKEN }}
          root: "."
